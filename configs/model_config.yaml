model:
  name: credit_risk_mlp
  version: 0.1.0
  type: classification

paths:
  train_data: data/processed/train.csv
  model_path: models/mlp_model.pt
  reference_data: artifacts/reference_data.csv

features:
  target: target

training:
  input_dim: 4
  hidden_dims: [64, 32]
  dropout: 0.3
  lr: 0.001
  epochs: 50
  batch_size: 256
  random_state: 42

mlflow:
  experiment_name: credit-risk

inference:
  threshold: 0.5